<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>告白網站</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    overflow: hidden;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.modal {
    background: rgba(30,30,30,0.95);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 360px;
}

h2 {
    min-height: 40px;
}

.btn {
    padding: 12px 30px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    position: fixed;
    transform: translate(-50%, -50%);
}

.agree {
    background: #ff3b3b;
    color: white;
}

.disagree {
    background: #555;
    color: white;
}

.congrats {
    position: absolute;
    font-size: 40px;
}

.hidden {
    display: none;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="modal" class="modal">
    <h2>恭喜</h2>
    <div style="margin-top:20px;">
        <button id="agree" class="btn agree">同意</button>
    </div>
</div>

<button id="disagree" class="btn disagree">不同意</button>

<div id="congrats" class="congrats hidden">恭喜</div>

<canvas id="fireworks"></canvas>

<script>
const d = document.getElementById('disagree');
const a = document.getElementById('agree');
const c = document.getElementById('congrats');
const v = document.getElementById('fireworks');
const t = v.getContext('2d');

let p = [];
let f = [];
let running = false;

let cx = window.innerWidth / 2;
let cy = window.innerHeight / 2;

let ax = cx - 120;
let ay = cy;

let dx = cx + 120;
let dy = cy;

function render() {
    a.style.left = ax + 'px';
    a.style.top = ay + 'px';

    d.style.left = dx + 'px';
    d.style.top = dy + 'px';
}

render();

window.addEventListener('resize', () => {
    cx = window.innerWidth / 2;
    cy = window.innerHeight / 2;

    ax = cx - 120;
    ay = cy;

    dx = cx + 120;
    dy = cy;

    v.width = window.innerWidth;
    v.height = window.innerHeight;

    render();
});

let lastMove = 0;

document.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastMove < 60) return;

    const dist = Math.hypot(dx - e.clientX, dy - e.clientY);

    if (dist < 140) {
        dx = Math.random() * window.innerWidth;
        dy = Math.random() * window.innerHeight;
    } else {
        dx += (cx + 120 - dx) * 0.06;
        dy += (cy - dy) * 0.06;
    }

    render();
    lastMove = now;
});

a.onclick = () => {
    if (running) return;
    running = true;

    document.getElementById('modal').style.display = 'none';

    setTimeout(() => {
        c.classList.remove('hidden');
    }, 300);

    v.width = window.innerWidth;
    v.height = window.innerHeight;

    loop();
};

function loop() {
    requestAnimationFrame(loop);

    t.fillStyle = 'rgba(0,0,0,0.2)';
    t.fillRect(0, 0, v.width, v.height);

    if (Math.random() < 0.05) {
        f.push({
            x: Math.random() * v.width,
            y: v.height,
            ty: Math.random() * v.height * 0.4,
            v: Math.random() * 6 + 8,
            c: `hsl(${Math.random() * 360},100%,60%)`
        });
    }

    for (let i = f.length - 1; i >= 0; i--) {
        let fw = f[i];
        fw.y -= fw.v;

        t.fillStyle = fw.c;
        t.beginPath();
        t.arc(fw.x, fw.y, 3, 0, Math.PI * 2);
        t.fill();

        if (fw.y <= fw.ty) {
            for (let j = 0; j < 60; j++) {
                p.push({
                    x: fw.x,
                    y: fw.y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    l: Math.random() * 30 + 50,
                    c: fw.c
                });
            }
            f.splice(i, 1);
        }
    }

    for (let i = p.length - 1; i >= 0; i--) {
        let pt = p[i];

        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.vy += 0.25;
        pt.l--;

        t.globalAlpha = Math.max(0, pt.l / 80);
        t.fillStyle = pt.c;
        t.beginPath();
        t.arc(pt.x, pt.y, 2, 0, Math.PI * 2);
        t.fill();
        t.globalAlpha = 1;

        if (pt.l <= 0) p.splice(i, 1);
    }

    if (p.length > 800) p.splice(0, 200);
    if (f.length > 50) f.splice(0, 10);
}
</script>

</body>
</html>
